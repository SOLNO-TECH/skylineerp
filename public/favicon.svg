<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Skyline">
  <rect width="32" height="32" rx="6" fill="#2D58A7"/>
  <!-- SL: S blanca + L roja corporativa, itálica (skew), tipografía bold tipo logo -->
  <g transform="translate(16 16.5) skewX(-13) translate(-16 -16.5)">
    <text
      x="16"
      y="21.5"
      text-anchor="middle"
      font-family="Arial Black, Helvetica Neue, Helvetica, Arial, sans-serif"
      font-weight="900"
      font-size="15"
      letter-spacing="-0.08em"
    >
      <tspan fill="#ffffff">S</tspan><tspan fill="#E62129">L</tspan>
    </text>
  </g>
</svg>
